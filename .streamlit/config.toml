# OPS-A: the dashboard's approval surface (approve/reject/kill-switch, and
# everything UI-PR-A widened) must never be reachable off-machine. This file
# pins the safe default so even the README's bare `streamlit run
# alphaos/dashboard/streamlit_app.py` binds to loopback only -- previously
# that command had no --server.address flag at all and would fall through to
# Streamlit's own default (effectively all interfaces). CLI flags still win
# over this file, so `deploy/run_dashboard.sh` (which passes the flags
# explicitly) and this file agree, not compete. See alphaos/dashboard/
# streamlit_app.py's _is_loopback_request() for the code-level guard that
# verifies this at runtime regardless of how the process was launched.
[server]
address = "127.0.0.1"
headless = true

[browser]
gatherUsageStats = false

# PR-UI-B1: console theme pass (styling only). Dark "cockpit instrument"
# palette per docs/roadmap/ported/stitch-design-tokens.md, adopted per the
# Fable5 ruling 2026-07-11 ("adopt the skin, quarantine the script" -- only
# the visual tokens are taken from the Stitch mockup's DESIGN.md; no mockup
# TEXT/copy is used anywhere in this app). This is a global, app-wide theme
# setting -- it necessarily reskins every tab, including the ones this PR
# does not otherwise touch (System Health, Trade Packet, Scan Batches,
# Scheduler Runs, System Events); their Python/data/behavior is unchanged,
# only their inherited base colors are.
[theme]
base = "dark"
backgroundColor = "#131313"
secondaryBackgroundColor = "#1c1b1b"
textColor = "#e5e2e1"
primaryColor = "#4cd7f6"
